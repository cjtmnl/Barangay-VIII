<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barangay VIII, Vigan City | Official Portal</title>
  <style>
    :root {
      --gov-blue: #112e51;
      --gov-light-blue: #205493;
      --gov-red: #cd2026;
      --bg-gray: #f9f9f9;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-gray);
      color: #333;
    }

    /* Header Section */
    .header {
      background-color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 4px solid var(--gov-blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .brgy-name {
      font-size: 26px;
      font-weight: 800;
      color: var(--gov-blue);
      margin: 0;
      text-transform: uppercase;
    }

    .datetime {
      font-size: 14px;
      color: #555;
      margin-top: 8px;
      font-family: monospace;
      background: #e9ecef;
      padding: 5px 10px;
      border-radius: 4px;
      display: inline-block;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-right img {
      height: 75px;
      width: auto;
    }

    /* Main Content */
    .container {
      max-width: 1100px;
      margin: 50px auto;
      padding: 0 20px;
      text-align: center;
    }

    .portal-title {
      margin-bottom: 40px;
      color: var(--gov-blue);
    }

    /* Rectangular Buttons */
    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .main-btn {
      background-color: var(--gov-light-blue);
      color: white;
      padding: 40px 20px;
      font-size: 22px;
      font-weight: bold;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(32, 84, 147, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .main-btn:hover {
      background-color: var(--gov-blue);
      transform: translateY(-5px);
    }

    .main-btn span {
      font-size: 14px;
      font-weight: normal;
      opacity: 0.9;
    }

    /* Content Viewer */
    .viewer-box {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: none;
      margin-top: 30px;
    }

    .viewer-controls {
      background: #eee;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .close-btn {
      background: var(--gov-red);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }

    @media (max-width: 768px) {
      .header { flex-direction: column; align-items: center; text-align: center; }
      .header-right { margin-top: 20px; }
      iframe { height: 500px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="brgy-name">Barangay VIII, Vigan City</div>
      <div class="datetime" id="pst-clock">Philippine Standard Time</div>
    </div>

    <div class="header-right">
      <img src="logo-vigan.png" alt="City Seal">
      <img src="logo-barangay.png" alt="Barangay Seal">
    </div>
  </header>

  <main class="container">
    <div class="portal-title">
      <h2>Public Information Center</h2>
      <p>Official digital resources for the residents of Barangay VIII.</p>
    </div>

    <div class="button-container">
      <button class="main-btn" onclick="openPDF('charter')">
        Citizens Charter
        <span>View Public Documents</span>
      </button>

      <button class="main-btn" onclick="openPDF('survey')">
        Survey
        <span>Community PDF Form</span>
      </button>
    </div>

    <div id="contentViewer" class="viewer-box">
      <div class="viewer-controls">
        <strong id="viewerTitle">Document Preview</strong>
        <button class="close-btn" onclick="closePDF()">CLOSE ×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </main>

  <script>
    // --- FILE NAMES ---
    // Ensure these match the files you upload to GitHub exactly
    const pdfFiles = {
      charter: "citizens-charter.pdf", 
      survey: "survey-form.pdf" 
    };

    function openPDF(type) {
      const viewer = document.getElementById('contentViewer');
      const frame = document.getElementById('pdfFrame');
      const title = document.getElementById('viewerTitle');

      title.innerText = type === 'charter' ? "Citizens Charter - Barangay VIII" : "Community Survey - Barangay VIII";
      
      frame.src = pdfFiles[type];
      viewer.style.display = 'block';
      viewer.scrollIntoView({ behavior: 'smooth' });
    }

    function closePDF() {
      const viewer = document.getElementById('contentViewer');
      const frame = document.getElementById('pdfFrame');
      viewer.style.display = 'none';
      frame.src = "";
    }

    function updatePST() {
      const now = new Date();
      const options = {
        timeZone: 'Asia/Manila',
        weekday: 'short', year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
      };
      document.getElementById('pst-clock').textContent = "Philippine Standard Time: " + new Intl.DateTimeFormat('en-PH', options).format(now);
    }

    setInterval(updatePST, 1000);
    updatePST();
  </script>

</body>
</html>
