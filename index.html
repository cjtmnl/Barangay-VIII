<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barangay VIII, Vigan City | Official Portal</title>
  <style>
    :root {
      --gov-blue: #112e51;
      --gov-light-blue: #205493;
      --gov-red: #cd2026;
      --bg-gray: #f9f9f9;
      --clock-bg: #222;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-gray);
    }

    .header {
      background-color: white;
      padding: 15px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 4px solid var(--gov-blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .brgy-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--gov-blue);
      text-transform: uppercase;
    }

    .pst-label {
      font-size: 10px;
      font-weight: bold;
      color: var(--gov-red);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #pst-clock {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      background-color: var(--clock-bg);
      padding: 6px 12px;
      border-radius: 4px;
      border-left: 4px solid var(--gov-red);
      display: inline-block;
    }

    .header-right img {
      height: 70px;
      width: auto;
      margin-left: 10px;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .button-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .main-btn {
      background-color: var(--gov-light-blue);
      color: white;
      padding: 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .viewer-box {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: none;
      margin-top: 30px;
      overflow: hidden;
    }

    iframe { width: 100%; height: 700px; border: none; }

    @media (max-width: 768px) {
      .header { flex-direction: column; text-align: center; }
      .header-right { margin-top: 15px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div>
      <div class="brgy-name">Barangay VIII, Vigan City</div>
      <div style="margin-top:10px;">
        <div class="pst-label">Philippine Standard Time</div>
        <div id="pst-clock">00:00:00</div>
      </div>
    </div>
    <div class="header-right">
      <img src="vigan.png" alt="City Seal">
      <img src="brgy.png" alt="Barangay Seal">
    </div>
  </header>

  <div class="container">
    <div class="button-container">
      <button class="main-btn" onclick="openPDF('citizens-charter.pdf', 'Citizens Charter')">Citizens Charter</button>
      <button class="main-btn" onclick="openPDF('survey-form.pdf', 'Community Survey')">Survey</button>
    </div>

    <div id="contentViewer" class="viewer-box">
      <div style="padding:10px; background:#eee; display:flex; justify-content:space-between; align-items:center;">
        <strong id="viewerTitle">Preview</strong>
        <button onclick="document.getElementById('contentViewer').style.display='none'" style="background:var(--gov-red); color:white; border:none; padding:5px 10px; cursor:pointer;">CLOSE ×</button>
      </div>
      <iframe id="pdfFrame" src=""></iframe>
    </div>
  </div>

  <script>
    function openPDF(file, title) {
      document.getElementById('viewerTitle').innerText = title;
      document.getElementById('pdfFrame').src = file;
      document.getElementById('contentViewer').style.display = 'block';
    }

    function updatePST() {
      const now = new Date();
      const options = { timeZone: 'Asia/Manila', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
      const dateOptions = { timeZone: 'Asia/Manila', month: 'short', day: '2-digit', year: 'numeric' };
      document.getElementById('pst-clock').textContent = `${new Intl.DateTimeFormat('en-PH', dateOptions).format(now)} | ${new Intl.DateTimeFormat('en-PH', options).format(now)}`;
    }
    setInterval(updatePST, 1000);
    updatePST();
  </script>
</body>
</html>
