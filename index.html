<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barangay VIII, Vigan City</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1f3a5f;
      color: white;
      padding: 10px 20px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .datetime {
      font-size: 14px;
      margin-top: 3px;
    }

    .header-right img {
      height: 50px;
      margin-left: 10px;
    }

    /* Navigation */
    .nav {
      background-color: #2c5d8a;
      padding: 10px;
    }

    .nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    /* Content */
    .container {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="title">Barangay VIII, Vigan City</div>
      <div class="datetime" id="datetime"></div>
    </div>
    <div class="header-right">
      <!-- Replace with your logo links -->
      <img src="logo1.png" alt="Logo 1">
      <img src="logo2.png" alt="Logo 2">
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <a href="#" onclick="loadPDF('pdf1')">Document 1</a>
    <a href="#" onclick="loadPDF('pdf2')">Document 2</a>
    <a href="#" onclick="loadPDF('pdf3')">Document 3</a>
  </div>

  <!-- Content Area -->
  <div class="container">
    <iframe id="pdfViewer" src=""></iframe>
  </div>

  <script>
    function loadPDF(doc) {
      let pdfLinks = {
        pdf1: "YOUR_PDF_LINK_1",
        pdf2: "YOUR_PDF_LINK_2",
        pdf3: "YOUR_PDF_LINK_3"
      };

      document.getElementById("pdfViewer").src = pdfLinks[doc];
    }

    function updateDateTime() {
      const now = new Date();

      const options = {
        timeZone: 'Asia/Manila',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: 'numeric',
        second: 'numeric',
        hour12: true
      };

      const formatted = new Intl.DateTimeFormat('en-PH', options).format(now);
      document.getElementById('datetime').textContent = formatted;
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
  </script>

</body>
</html>
